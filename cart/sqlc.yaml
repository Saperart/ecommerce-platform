version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repository/cart/postgres/queries.sql"
    schema: "migrations/migrations"
    gen:
      go:
        package: "sqlc"
        sql_package: "pgx/v5"
        out: "internal/repository/cart/postgres/sqlc"
        emit_json_tags: true
        emit_interface: true
        omit_unused_structs: true
